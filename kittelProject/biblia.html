::selection { background: #B3D4FC; color: #000; }
.dark ::selection { background: #2A5C7A; color: #fff; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: background 0.2s; }

header { 
    background: var(--header-bg); 
    color: #fff; 
    padding: 4px 12px; 
    display: grid; 
    grid-template-rows: auto auto auto; 
    gap: 6px; 
    flex-shrink: 0;
}
.header-row-1, .header-row-3 { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}
.brand { display: flex; align-items: center; gap: 8px; }
.brand .logo { height: 29px; width: auto; border-radius: 3px; }
.brand h1 { font-size: 15px; font-weight: 700; }
.menu-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 2px; opacity: 0.8; }

.header-row-2 { display: flex; width: 100%; }
.search-container { width: 100%; }
.search-container input { 
    width: 100%; 
    padding: 10px 14px; 
    border: none; 
    border-radius: 6px; 
    font-size: 14px; 
    outline: none; 
    background: #fff; 
    color: #333;
}

.toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 4px; }
.btn-tool { 
    background: rgba(255,255,255,0.1); 
    border: 1px solid rgba(255,255,255,0.2); 
    color: rgba(255,255,255,0.8); 
    font-size: 10px; 
    font-weight: 700; 
    padding: 3px 8px; 
    border-radius: 4px; 
    cursor: pointer; 
    text-transform: uppercase; 
}
.btn-tool:hover, .btn-tool.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.font-ctrl { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 6px; }
#fontSizeLabel { font-size: 10px; font-weight: 700; min-width: 18px; text-align: center; }

.nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.nav-overlay.open { opacity: 1; pointer-events: auto; }
.nav-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; max-width: 80vw; background: var(--header-bg); color: #fff; z-index: 201; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
.nav-panel.open { transform: translateX(0); }
.nav-header { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
.nav-header h2 { font-size: 16px; font-weight: 700; }
.nav-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; opacity: 0.7; }
.nav-content { flex: 1; overflow-y: auto; padding: 10px 0; }
.nav-item { padding: 10px 16px; cursor: pointer; font-size: 14px; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
.nav-item:hover { background: rgba(255,255,255,0.1); }
.nav-item.active { background: var(--accent); color: #fff; }
.nav-back { padding: 10px 16px; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 13px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
.nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; padding: 16px; }
.nav-grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 700; transition: background 0.2s; }
.nav-grid-item:hover { background: var(--accent); }

.nav-chapter-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 5; width: 44px; height: 80px; background: transparent; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.nav-chapter-btn:hover { background: var(--hover-bg); color: var(--accent); }
.nav-chapter-btn:disabled { opacity: 0.2; cursor: default; }

.nav-chapter-btn.next { right: 5px; }

const STRONG_MAP = {};
if (typeof STRONG_DATA !== 'undefined') {

if (isDark) document.documentElement.classList.add('dark');

const TESTAMENTS = {
    AT: BOOK_NAMES.slice(0, 39),
    NT: BOOK_NAMES.slice(39)
};
const AT_BOOKS = TESTAMENTS.AT;
const NT_BOOKS = TESTAMENTS.NT;
const ALL_BOOKS = BOOK_NAMES;

function stripAccents(s) {
    return s.normalize('NFD').replace(/[\u0300-\u036F]/g, '');
}

const HIGHLIGHT_COLORS = {
    'yellow': '#ffff00',
    'green': '#ccffcc',
    'blue': '#cceeff',
    'pink': '#ffcccc',
    'none': 'transparent'
};

function applyHighlights() {
    document.querySelectorAll('.verse').forEach(el => {
        const vNum = el.querySelector('.v-num')?.textContent;
        if (!vNum) return;
        const ref = `${currentBook} ${currentChapter}:${vNum}`;
        if (highlights[ref]) {
            el.style.backgroundColor = highlights[ref];
        } else {
            el.style.backgroundColor = '';
        }
    });
}

function saveHighlights() {
    localStorage.setItem('bibliaHighlights', JSON.stringify(highlights));
}

function showHighlightMenu(e, ref) {
    const menu = document.getElementById('highlightMenu');
    menu.innerHTML = '';
    
    Object.entries(HIGHLIGHT_COLORS).forEach(([name, color]) => {
        const btn = document.createElement('div');
        btn.className = 'highlight-color';
        btn.style.backgroundColor = color;
        if (highlights[ref] === color) btn.classList.add('active');
        btn.title = name;
        btn.onclick = () => {
            if (color === 'transparent') {
                delete highlights[ref];
            } else {
                highlights[ref] = color;
            }
            saveHighlights();
            applyHighlights();
            menu.style.display = 'none';
        };
        menu.appendChild(btn);
    });
    
    menu.style.display = 'flex';
    menu.style.left = e.pageX + 'px';
    menu.style.top = e.pageY + 'px';
}

function markStrongWords(text) {
    if (!strongEnabled || !STRONG_INDEX || !STRONG_INDEX.single) return text;
    
    const isAT = AT_BOOKS.includes(currentBook);
    const isNT = NT_BOOKS.includes(currentBook);
    
    // Tokenize: HTML tags, words, or other (spaces/punctuation)
    const tokens = text.match(/(<[^>]+>)|([a-záéíóúüñ]+)|([^a-záéíóúüñ<]+)/gi) || [text];
    
    return tokens.map(function(token) {
        // HTML tag — pass through
        if (token.charAt(0) === '<' && token.charAt(token.length - 1) === '>') return token;
        
        // Word — wrap in word-block with optional Strong numbers above
        if (/^[a-záéíóúüñ]+$/i.test(token)) {
            const stripped = stripAccents(token.toLowerCase());
            const entry = STRONG_INDEX.single[stripped];
            
            var strongsHtml = '';
            if (entry) {
                var strongNumsStr = entry.split('||')[0];
                var allNums = strongNumsStr.split(';');
                
                var filteredNums = allNums.filter(function(num) {
                    if (isAT) return num.startsWith('H');
                    if (isNT) return num.startsWith('G');
                    return true;
                });

                if (filteredNums.length > 0) {
                    strongsHtml = '<div class="strongs">' + 
                        filteredNums.map(function(num) {
                            var nVal = parseInt(num.replace(/\D/g, ''));
                            var detail = STRONG_MAP[nVal];
                            if (detail) {
                                return '<span class="strong-badge" data-strong="' + num + '" data-lemma="' + escHtml(detail.w) + '" data-translit="' + escHtml(detail.t) + '" data-def="' + escHtml(detail.d.slice(0, 120).replace(/\n/g, ' ')) + '">' + num + '</span>';
                            }
                            return '<span class="strong-badge" data-strong="' + num + '">' + num + '</span>';
                        }).join(' ') + 
                        '</div>';
                }
            }
            
            return '<span class="word-block">' + strongsHtml + '<span class="word">' + token + '</span></span>';
        }
        
        // Non-word (spaces, punctuation) — pass through
        return token;
    }).join('');
}

function showWelcome() {
    const shortcuts = [
        { name: 'Génesis 1', ref: 'Génesis 1' },
        { name: 'Salmos 23', ref: 'Salmos 23' },
        { name: 'Isaías 40', ref: 'Isaías 40' },
        { name: 'S. Mateo 5', ref: 'S. Mateo 5' },
        { name: 'S. Juan 1', ref: 'S. Juan 1' },
        { name: 'Romanos 8', ref: 'Romanos 8' },
        { name: 'Apocalipsis 21', ref: 'Apocalipsis 21' }
    ];
    const view = document.getElementById('bible-view');
    view.innerHTML = `
        <div class="welcome">
            <h2>Reina Valera 1960</h2>
            <p class="sub">Selecciona un pasaje para comenzar o usa el buscador</p>
            <div class="quick-grid">
                ${shortcuts.map(s => `<div class="quick-card" data-ref="${s.ref}">${s.name}</div>`).join('')}
            </div>
        </div>`;
    
    view.querySelectorAll('.quick-card').forEach(el => {
        el.addEventListener('click', function() {
            const ref = this.dataset.ref;
            document.getElementById('search').value = ref;
            searchBible(ref);
        });
    });
}

function showChapter() {
    if (!currentBook || !currentChapter) return;
    const view = document.getElementById('bible-view');
    const chapters = BIBLE_DATA[currentBook];
    if (!chapters) return;

    const chapterData = chapters[String(currentChapter)];
    if (!chapterData) {
        view.innerHTML = `<div class="welcome"><h2>Capítulo no encontrado</h2></div>`;
        return;
    }

    // Save last passage to localStorage
    localStorage.setItem('lastBook', currentBook);
    localStorage.setItem('lastChapter', currentChapter);

    const maxCh = Object.keys(chapters).length;
    
    let html = `<div class="chapter-card"><div class="chapter-title">${currentBook} ${currentChapter}</div>`;
    for (const [vNum, vText] of Object.entries(chapterData)) {
        const processedText = markStrongWords(vText);
        html += `<div class="verse"><span class="v-num">${vNum}</span>${processedText}</div>`;
    }
    html += '</div>';
    view.innerHTML = html;
    applyHighlights();

    document.getElementById('prevCh').disabled = currentChapter <= 1;
    document.getElementById('nextCh').disabled = currentChapter >= maxCh;

    view.querySelectorAll('.v-num').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            const v = this.textContent;
            document.getElementById('search').value = `${currentBook} ${currentChapter}:${v}`;
            this.parentElement.style.background = 'rgba(42, 92, 122, 0.1)';
            setTimeout(() => { 
                if (!highlights[`${currentBook} ${currentChapter}:${v}`]) {
                    this.parentElement.style.background = ''; 
                } else {
                    this.parentElement.style.backgroundColor = highlights[`${currentBook} ${currentChapter}:${v}`];
                }
            }, 1500);
        });
    });

    view.querySelectorAll('.verse').forEach(el => {
        el.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const vNum = this.querySelector('.v-num')?.textContent;
            if (vNum) {
                showHighlightMenu(e, `${currentBook} ${currentChapter}:${vNum}`);
            }
        });
    });
}

function parseReference(ref) {
    const parts = ref.trim().split(/\s+/);
    if (parts.length < 2) return;

    const chPart = parts.pop(); // e.g., "3:16" or "1"
    const bookName = parts.join(' ');

    let ch = parseInt(chPart);
    let v = null;

    if (chPart.includes(':')) {
        const [c, ...vp] = chPart.split(':');
        ch = parseInt(c);
        v = vp.join(':');
    }

    // Find the book
    const key = bookName.toLowerCase().trim();
    const alias = BOOK_ALIASES[key];
    let match = alias ? alias : BOOK_NAMES.find(b => b.toLowerCase() === key);
    if (match) {
        currentBook = match;
        currentChapter = ch;
        showChapter();
        document.getElementById('search').value = ref;
        if (v) {
            setTimeout(() => {
                const target = document.querySelector(`.v-num`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 200);
        }
        return true;
    }
    return false;
}

function searchBible(query) {
    console.log('Búsqueda:', query);
    const q = stripAccents(query.toLowerCase().trim());
    if (!q) {
        showWelcome();
        return;
    }
    
    // Check for reference pattern: "Book C:V", "Book C.V", "Book C V", or "Book C"
    let refMatch = q.match(/^([a-záéíóúüñ\s]+?)\s*(\d+)(?:[:.](\d+))?$/i);
    if (!refMatch) {
        refMatch = q.match(/^([a-záéíóúüñ\s]+?)\s+(\d+)\s+(\d+)$/i);
    }
    if (refMatch) {
        const bk = refMatch[1].trim();
        const ch = parseInt(refMatch[2]);
        const bkey = stripAccents(bk.toLowerCase());
        const balias = BOOK_ALIASES[bkey];
        let book = balias ? balias : BOOK_NAMES.find(b => stripAccents(b.toLowerCase()) === bkey);
        if (!book) {
            book = BOOK_NAMES.find(b => stripAccents(b.toLowerCase()).startsWith(bkey) || bkey.startsWith(stripAccents(b.toLowerCase().split(' ').pop())));
        }
        if (book && BIBLE_DATA[book] && BIBLE_DATA[book][String(ch)]) {
            currentBook = book;
            currentChapter = ch;
            showChapter();
            return;
        }
    }
    
    // Full-text search across Bible
    const results = [];
    const scope = searchFilter === 'AT' ? AT_BOOKS : searchFilter === 'NT' ? NT_BOOKS : ALL_BOOKS;
    for (const book of scope) {
        for (const [chNum, verses] of Object.entries(BIBLE_DATA[book])) {
            for (const [vNum, vText] of Object.entries(verses)) {
                const testText = stripAccents(vText.toLowerCase());
                if (testText.includes(q)) {
                    results.push({ book, chapter: parseInt(chNum), verse: parseInt(vNum), text: vText });
                }
            }
        }
    }
    console.log('Resultados encontrados:', results.length);
    
    const view = document.getElementById('bible-view');
    if (results.length === 0) {
        view.innerHTML = `<div class="welcome"><h2>Sin resultados</h2><p class="sub">No se encontraron versículos para "${query}"</p></div>`;
        searchResults = [];
        return;
    }
    
    searchResults = results;
    let html = `<div class="chapter-card"><div class="chapter-title">Resultados: ${results.length} versículos</div>`;
    const maxShow = Math.min(100, results.length);
    for (let i = 0; i < maxShow; i++) {
        const r = results[i];
        const ref = `${r.book} ${r.chapter}:${r.verse}`;
        
        // Highlight search term
        const regex = new RegExp(`(${q})`, 'gi');
        let text = r.text.length > 120 ? r.text.slice(0, 120) + '…' : r.text;
        const highlightedText = text.replace(regex, '<mark style="background: #ffd700; color: #000;">$1</mark>');
        const finalText = markStrongWords(highlightedText);
        
        html += `<div class="verse" style="cursor:pointer;padding:4px 0;" data-ref="${ref}"><span class="v-num">${ref}</span> ${finalText}</div>`;
    }
    if (results.length > 100) {
        html += `<div class="verse" style="color:var(--text-muted);text-align:center;padding:8px;">… y ${results.length - 100} resultados más</div>`;
    }
    html += '</div>';
    view.innerHTML = html;
    applyHighlights();
    
    view.querySelectorAll('.verse[data-ref]').forEach(el => {
        el.addEventListener('click', function() {
            const ref = this.dataset.ref;
            document.getElementById('search').value = ref;
            console.log('Versículo seleccionado:', ref);
            const lastSpace = ref.lastIndexOf(' ');
            const book = ref.slice(0, lastSpace);
            const rest = ref.slice(lastSpace + 1);
            const [ch, v] = rest.split(':').map(Number);
            
            currentBook = book;
            currentChapter = ch;
            showChapter();
            
            setTimeout(() => {
                const allVNums = document.querySelectorAll('.v-num');
                allVNums.forEach(el => {
                    if (el.textContent === String(v)) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 200);
        });
        
        el.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const ref = this.dataset.ref;
            if (ref) {
                showHighlightMenu(e, ref);
            }
        });
    });
}

function goToPrevChapter() {
    if (!currentBook || !currentChapter) return;
    if (currentChapter > 1) {
        currentChapter--;
        document.getElementById('search').value = currentBook + ' ' + currentChapter;
        showChapter();
    }
}

function goToNextChapter() {
    if (!currentBook || !currentChapter) return;
    const maxCh = Object.keys(BIBLE_DATA[currentBook]).length;
    if (currentChapter < maxCh) {
        currentChapter++;
        document.getElementById('search').value = currentBook + ' ' + currentChapter;
        showChapter();
    }
}
document.getElementById('prevCh').addEventListener('click', goToPrevChapter);
document.getElementById('nextCh').addEventListener('click', goToNextChapter);

let searchTimer;
document.getElementById('search').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchBible(this.value), 200);
});
document.getElementById('search').addEventListener('focus', function() {
    this.select();
});
document.querySelectorAll('#searchFilter .btn-tool[data-filter]').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('#searchFilter .btn-tool[data-filter]').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        searchFilter = this.dataset.filter;
        const q = document.getElementById('search').value;
        if (q.trim()) searchBible(q);
    });
});

document.getElementById('strongToggle').addEventListener('click', function() {
    strongEnabled = !strongEnabled;
    this.textContent = `Strong: ${strongEnabled ? 'On' : 'Off'}`;
    this.classList.toggle('active', strongEnabled);
    if (currentBook && currentChapter) {
        showChapter();
    } else if (searchResults.length > 0) {
        searchBible(document.getElementById('search').value);
    }
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.metaKey) { goToPrevChapter(); }
    if (e.key === 'ArrowRight' && !e.ctrlKey && !e.metaKey) { goToNextChapter(); }
});

document.getElementById('content').addEventListener('mouseover', function(e) {
    if (e.target.classList.contains('strong-badge')) {
        const badge = e.target;
        const tooltip = document.getElementById('strongTooltip');
        const { lemma, translit, def } = badge.dataset;
        const strongNum = badge.dataset.strong;

        tooltip.innerHTML = `<b>${strongNum}</b> <span class="orig">${lemma}</span> <span class="trans">${translit}</span><span class="def">${def}</span>`;
        tooltip.style.display = 'block';
        
        const rect = badge.getBoundingClientRect();
        tooltip.style.left = (rect.left + window.scrollX) + 'px';
        tooltip.style.top = (rect.top + window.scrollY - tooltip.offsetHeight - 8) + 'px';
        
        setTimeout(() => { tooltip.style.opacity = '1'; }, 10);
    }
});

document.getElementById('content').addEventListener('mouseout', function(e) {
    if (e.target.classList.contains('strong-badge')) {
        const tooltip = document.getElementById('strongTooltip');
        tooltip.style.opacity = '0';
        setTimeout(() => { tooltip.style.display = 'none'; }, 200);
    }
});

document.getElementById('content').addEventListener('click', function(e) {
    if (e.target.classList.contains('strong-badge')) {
        const strongNum = e.target.dataset.strong;
        // Broadcast search to Kittel and Strong panels
        const frameKittel = window.parent.document.getElementById('frameKittel');
        const frameStrong = window.parent.document.getElementById('frameStrong');
        if (frameKittel) frameKittel.contentWindow.postMessage({ type: 'search', query: strongNum }, '*');
        if (frameStrong) frameStrong.contentWindow.postMessage({ type: 'search', query: strongNum }, '*');
    }
});

// Navegación por Menú Hamburguesa
function initNav() {
    const navOverlay = document.getElementById('navOverlay');
    const navPanel = document.getElementById('navPanel');
    const navContent = document.getElementById('navContent');
    const navTitle = document.getElementById('navTitle');
    const menuBtn = document.getElementById('menuBtn');

    function openNav(view) {
        navOverlay.classList.add('open');
        navPanel.classList.add('open');
        renderNav(view);
    }

    function closeNav() {
        navOverlay.classList.remove('open');
        navPanel.classList.remove('open');
    }

    function renderNav(view, book = null, chapter = null) {
        navContent.innerHTML = '';
        
        if (view === 'books') {
            navTitle.textContent = 'Libros';
            BOOK_NAMES.forEach(name => {
                const item = document.createElement('div');
                item.className = `nav-item ${name === currentBook ? 'active' : ''}`;
                item.innerHTML = `<span>${name}</span> <span>❯</span>`;
                item.onclick = () => { document.getElementById('search').value = name; renderNav('chapters', name); };
                navContent.appendChild(item);
            });
        } else if (view === 'chapters') {
            navTitle.textContent = book;
            const back = document.createElement('div');
            back.className = 'nav-back';
            back.innerHTML = '<span>◀ Volver a Libros</span>';
            back.onclick = () => renderNav('books');
            navContent.appendChild(back);

            const grid = document.createElement('div');
            grid.className = 'nav-grid';
            const chapters = Object.keys(BIBLE_DATA[book]);
            chapters.forEach(ch => {
                const item = document.createElement('div');
                item.className = `nav-grid-item ${ch == currentChapter ? 'active' : ''}`;
                item.textContent = ch;
                item.onclick = () => { document.getElementById('search').value = book + ' ' + ch; renderNav('verses', book, ch); };
                grid.appendChild(item);
            });
            navContent.appendChild(grid);
        } else if (view === 'verses') {
            navTitle.textContent = `${book} ${chapter}`;
            const back = document.createElement('div');
            back.className = 'nav-back';
            back.innerHTML = `<span>◀ Volver a Capítulos de ${book}</span>`;
            back.onclick = () => renderNav('chapters', book);
            navContent.appendChild(back);

            const verses = BIBLE_DATA[book][chapter];
            Object.keys(verses).forEach(v => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerHTML = `<span>Versículo ${v}</span>`;
                item.onclick = () => {
                    document.getElementById('search').value = book + ' ' + chapter + ':' + v;
                    currentBook = book;
                    currentChapter = parseInt(chapter);
                    showChapter();
                    closeNav();
                    setTimeout(() => {
                        const allVNums = document.querySelectorAll('.v-num');
                        allVNums.forEach(el => {
                            if(el.textContent === v) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        });
                    }, 200);
                };
                navContent.appendChild(item);
            });
        }
    }

    menuBtn.addEventListener('click', () => openNav('books'));
    document.getElementById('navClose').addEventListener('click', closeNav);
    navOverlay.addEventListener('click', closeNav);
}

// Initialize navigation
initNav();

// Messages from parent
window.addEventListener('click', function(e) {
    if (!e.target.closest('.highlight-menu')) {
        document.getElementById('highlightMenu').style.display = 'none';
    }
});

window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'toggleDark') {
        isDark = e.data.dark;
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem('bibliaDark', isDark);
    }
    if (e.data.type === 'search') {
        document.getElementById('search').value = e.data.query || '';
        searchBible(e.data.query || '');
    }
    if (e.data.type === 'fontChange') {
        document.querySelectorAll('.verse').forEach(function(el) { el.style.fontSize = e.data.size + 'px'; });
    }
});

// Font Size Control
let currentFontSize = parseInt(localStorage.getItem('bibliaFontSize')) || 16;
const fontLabel = document.getElementById('fontSizeLabel');

function applyFontSize(size) {
    currentFontSize = size;
    // Update CSS variable
    document.documentElement.style.setProperty('--verse-font-size', size + 'px');
    // Fallback: update all verses directly to ensure it works
    document.querySelectorAll('.verse').forEach(el => {
        el.style.fontSize = size + 'px';
    });
    if (fontLabel) fontLabel.textContent = size;
    localStorage.setItem('bibliaFontSize', size);
}

document.getElementById('fontDecr').addEventListener('click', () => {
    if (currentFontSize > 8) applyFontSize(currentFontSize - 1);
});

document.getElementById('fontIncr').addEventListener('click', () => {
    if (currentFontSize < 40) applyFontSize(currentFontSize + 1);
});

// Initial application of font size
applyFontSize(currentFontSize);

// Init
document.getElementById('search').value = '';
const lastBook = localStorage.getItem('lastBook');
const lastChapter = localStorage.getItem('lastChapter');

if (lastBook && lastChapter) {
    currentBook = lastBook;
    currentChapter = parseInt(lastChapter);
    showChapter();
} else {
    currentBook = 'Génesis';
    currentChapter = 1;
    showChapter();
}
</script>
