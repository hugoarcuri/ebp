            }
            KITTEL_BY_LEMMA[normalized].push(entry);

    });
}

function findKittelForLemma(lemma) {
    if (!lemma || !KITTEL_BY_LEMMA) return null;
    var key = lemma.trim().toLowerCase();
    if (KITTEL_BY_LEMMA[key]) return KITTEL_BY_LEMMA[key];
    if (key.length > 2) {
        for (var k in KITTEL_BY_LEMMA) {

function stripAccents(s) {
    return s.normalize('NFD').replace(/[\u0300-\u036F]/g, '');
}

const HIGHLIGHT_COLORS = {
    'yellow': '#ffff00',
    'green': '#ccffcc',
    'blue': '#cceeff',
    'pink': '#ffcccc',
    'none': 'transparent'
};

function applyHighlights() {
    document.querySelectorAll('.verse').forEach(el => {
        const vNum = el.querySelector('.v-num')?.textContent;
        if (!vNum) return;
        const ref = `${currentBook} ${currentChapter}:${vNum}`;
        if (highlights[ref]) {
            el.style.backgroundColor = highlights[ref];
        } else {
            el.style.backgroundColor = '';
        }
    });
}

function saveHighlights() {
    localStorage.setItem('bibliaHighlights', JSON.stringify(highlights));
}

function showHighlightMenu(e, ref) {
    const menu = document.getElementById('highlightMenu');
    menu.innerHTML = '';
    
    Object.entries(HIGHLIGHT_COLORS).forEach(([name, color]) => {
        const btn = document.createElement('div');
        btn.className = 'highlight-color';
        btn.style.backgroundColor = color;
        if (highlights[ref] === color) btn.classList.add('active');
        btn.title = name;
        btn.onclick = () => {
            if (color === 'transparent') {
                delete highlights[ref];
            } else {
                highlights[ref] = color;
            }
            saveHighlights();
            applyHighlights();
            menu.style.display = 'none';
        };
        menu.appendChild(btn);
    });
    
    menu.style.display = 'flex';
    menu.style.left = e.pageX + 'px';
    menu.style.top = e.pageY + 'px';
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildWordObjects(text) {
    var isAT = AT_BOOKS.includes(currentBook);
    var isNT = NT_BOOKS.includes(currentBook);
    var tokens = text.match(/(<[^>]+>)|([a-záéíóúüñ]+)|([^a-záéíóúüñ<]+)/gi) || [text];
    var result = [];
    tokens.forEach(function(token) {
        if (token.charAt(0) === '<' && token.charAt(token.length - 1) === '>') {
            result.push({ type: 'html', html: token });
            return;
        }
        if (/^[a-záéíóúüñ]+$/i.test(token)) {
            var stripped = stripAccents(token.toLowerCase());
            var entry = STRONG_INDEX.single[stripped];
            var strongs = [];
            if (entry) {
                var strongNumsStr = entry.split('||')[0];
                var allNums = strongNumsStr.split(';');
                strongs = allNums.filter(function(num) {
                    if (isAT) return num.startsWith('H');
                    if (isNT) return num.startsWith('G');
                    return true;
                });
            }
            result.push({ type: 'word', text: token, strongs: strongs });
            return;
        }
        result.push({ type: 'sep', text: token });
    });
    return result;
}

function renderWordObjects(objects) {
    return objects.map(function(obj) {
        if (obj.type === 'html') return obj.html;
        if (obj.type === 'sep') return obj.text;
        
        var strongHtml = '';
        if (obj.strongs.length > 0) {
            strongHtml = obj.strongs.map(function(num) {
                var detail = STRONG_MAP[num];
                if (detail) {
                    return '<span class="s" data-s="' + num + '" data-l="' + escHtml(detail.w) + '" data-t="' + escHtml(detail.t) + '" data-d="' + escHtml(detail.d.slice(0, 120).replace(/\\n/g, ' ')) + '">' + num + '</span>';
                }
                return '<span class="s" data-s="' + num + '">' + num + '</span>';
            }).join('');
        }
        
        var wClass = 'wu';
        if (obj.strongs && obj.strongs.length > 0) {
            wClass += ' wu-has-strong';
        } else {
            wClass += ' wu-no-strong';
        }
        return '<span class="' + wClass + '"><span class="w">' + obj.text + '</span>' + strongHtml + '</span>';
    }).join('');
}

function findStrongFallback(word, isOT, isNT, showAll) {
    if (typeof STRONG_INDEX === 'undefined' || !STRONG_INDEX.single) return [];
    var lower = word.toLowerCase();
    var debug = window.location.search.indexOf('debug=1') >= 0;
    var isFuncWord = FUNC_WORDS[stripAccents(lower)] !== undefined;
    if (isFuncWord && !showAll) {
        if (debug) console.log('Palabra: ' + word + ' | Confianza: baja (funcional) | Resultado: ocultar');
        return [];
    }
    function strongInfo(num) {
        if (typeof STRONG_MAP === 'undefined') return { lemma: '', def: '' };
        var e = STRONG_MAP[num];
        return { lemma: e ? e.w || '' : '', def: e ? e.d || '' : '' };
    }
    function filterByTestament(nums) {
        var out = [];
        for (var j = 0; j < nums.length; j++) {
            var num = nums[j];
            if (isOT && num.charAt(0) === 'H') out.push(num);
            else if (isNT && num.charAt(0) === 'G') out.push(num);
        }
        return out;
    }
    // Check manual aliases first
    if (typeof MANUAL_ALIASES !== 'undefined') {
        var aliasKey = stripAccents(lower);
        var aliasLemma = MANUAL_ALIASES[aliasKey];
        if (aliasLemma) {
            var aliasEntry = STRONG_INDEX.single[stripAccents(aliasLemma)];
            if (aliasEntry) {
                var filtered = filterByTestament(aliasEntry.split('||')[0].split(';'));
                if (filtered.length === 1) {
                    if (debug) {
                        var info = strongInfo(filtered[0]);
                        console.log('Palabra: ' + word + '\nStrong asignado: ' + filtered[0] + '\nLema Strong: ' + info.lemma + '\nDefinicion: ' + info.def.slice(0, 120) + '\nCoincidencia: alta (alias manual)');
                    }
                    return filtered;
                }
                if (filtered.length > 1) {
                    if (debug) console.log('Palabra: ' + word + ' | Confianza: baja (alias ambiguo) | Resultado: ocultar');
                    return [];
                }
            }
        }
    }
    // Check direct word->Strong mappings from STEPBible (TAGNT + TIPNR)
    if (typeof DIRECT_STRONG !== 'undefined') {
        var directKey = stripAccents(lower);
        var directStrong = DIRECT_STRONG[directKey];
        if (directStrong) {
            var filtered = filterByTestament([directStrong]);
            if (filtered.length === 1) {
                if (debug) {
                    var info = strongInfo(filtered[0]);
                    console.log('Palabra: ' + word + '\nStrong asignado: ' + filtered[0] + '\nLema Strong: ' + info.lemma + '\nDefinicion: ' + info.def.slice(0, 120) + '\nCoincidencia: alta (directo STEPBible)');
                }
                return filtered;
            }
            if (filtered.length > 1) {
                return [];
            }
        }
    }
    // Try original form first
    var originalKey = stripAccents(lower);
    var originalEntry = STRONG_INDEX.single[originalKey];
    if (originalEntry) {
        var filtered = filterByTestament(originalEntry.split('||')[0].split(';'));
        if (filtered.length === 1) {
            if (debug) {
                var info = strongInfo(filtered[0]);
                console.log('Palabra: ' + word + '\nStrong asignado: ' + filtered[0] + '\nLema Strong: ' + info.lemma + '\nDefinicion: ' + info.def.slice(0, 120) + '\nCoincidencia: alta (forma original)');
            }
            return filtered;
        }
        if (filtered.length > 1) {
            if (debug) console.log('Palabra: ' + word + ' | Confianza: baja (original ambiguo) | Resultado: ocultar');
            return [];
        }
        // filtered.length === 0: wrong testament, fall through to lemma
    }
    // Fall back to lemma candidates
    var candidates = lemmatize(lower);
    var seen = {}, unique = [];
    for (var i = 0; i < candidates.length; i++) {
        var key = stripAccents(candidates[i]);
        if (!seen[key]) { seen[key] = true; unique.push(key); }
    }
    var bestMatch = null, bestCount = Infinity, bestKey = null;
    for (var i = 0; i < unique.length; i++) {
        var entry = STRONG_INDEX.single[unique[i]];
        if (!entry) continue;
        var filtered = filterByTestament(entry.split('||')[0].split(';'));
        if (filtered.length > 0 && filtered.length < bestCount) {
            bestMatch = filtered;
            bestCount = filtered.length;
            bestKey = unique[i];
        }
    }
    if (!bestMatch) {
        // Fuzzy fallback: buscar coincidencia parcial en el índice Strong
        var origPlain = stripAccents(lower);
        var bestFuzzy = null, bestFuzzyKey = null;
        for (var idxKey in STRONG_INDEX.single) {
            if (!STRONG_INDEX.single.hasOwnProperty(idxKey)) continue;
            var idxEntry = STRONG_INDEX.single[idxKey];
            var idxNums = filterByTestament(idxEntry.split('||')[0].split(';'));
            if (idxNums.length === 0) continue;
            // Prefijo de 4+ caracteres
            if (origPlain.length >= 4 && idxKey.indexOf(origPlain) === 0) {
                bestFuzzy = idxNums;
                bestFuzzyKey = idxKey;
                break;
            }
            // El lemma del índice contiene la palabra completa o viceversa
            if (origPlain.length >= 3) {
                if (idxKey.indexOf(origPlain) >= 0 || origPlain.indexOf(idxKey) >= 0) {
                    if (idxNums.length === 1) {
                        bestFuzzy = idxNums;
                        bestFuzzyKey = idxKey;
                        break;
                    }
                    if (!bestFuzzy || idxNums.length <= bestFuzzy.length) {
                        bestFuzzy = idxNums;
                        bestFuzzyKey = idxKey;
                    }
                }
            }
        }
        if (bestFuzzy && bestFuzzy.length === 1) {
            if (debug) {
                var info = strongInfo(bestFuzzy[0]);
                console.log('Palabra: ' + word + '\nStrong asignado: ' + bestFuzzy[0] + '\nLema Strong: ' + info.lemma + '\nDefinicion: ' + info.def.slice(0, 120) + '\nCoincidencia: baja (fuzzy con ' + bestFuzzyKey + ')');
            }
            return bestFuzzy;
        }
        return [];
    }
    if (bestCount > 1) {
        if (debug) {
            var info = strongInfo(bestMatch[0]);
            console.log('Palabra: ' + word + '\nStrong asignado: ' + bestMatch[0] + '\nLema Strong: ' + info.lemma + '\nDefinicion: ' + info.def.slice(0, 120) + '\nCoincidencia: baja (' + bestCount + ' candidatos)');
        }
        return [];
    }
    if (debug) {
        var info = strongInfo(bestMatch[0]);
        console.log('Palabra: ' + word + '\nStrong asignado: ' + bestMatch[0] + '\nLema Strong: ' + info.lemma + '\nDefinicion: ' + info.def.slice(0, 120) + '\nCoincidencia: alta');
    }
    return bestMatch;
}

function markStrongWords(text, verseRef) {

    var isOT = false, isNT = false;

        var book = refMatch[1];
        isOT = AT_BOOKS.indexOf(book) >= 0;
        isNT = NT_BOOKS.indexOf(book) >= 0;

    var wordIdx = 0;

    var objects = tokens.map(function(token) {
        if (token.charAt(0) === '<' && token.charAt(token.length - 1) === '>') return { type: 'html', html: token };
        if (/^[a-z\u00e1\u00e9\u00ed\u00f3\u00fa\u00fc\u00f1]+$/i.test(token)) {
            var strongs = [];

            if (wordStrongs && wordIdx < wordStrongs.length) {
                strongs = wordStrongs[wordIdx];
                if (strongs && strongs.length > 0) fromInterlinear = true;
            }
            if ((!strongs || strongs.length === 0) && (isOT || isNT)) strongs = findStrongFallback(token, isOT, isNT, false);

                console.log('[diagnostico] palabra:\x22' + token + '\x22 | strong:' + strongStr + ' | indice palabra:' + idxPalabra + ' | origen:' + origen);
            } else if (debugMode) {
                var idxPalabra = wordIdx + 1;

            return { type: 'word', text: token, strongs: strongs || [] };
        }
        return { type: 'sep', text: token };
    });
    return renderWordObjects(objects);
}

function showChapter() {
    if (!currentBook || !currentChapter) return;
    const view = document.getElementById('bible-view');
    const chapters = BIBLE_DATA[currentBook];
    if (!chapters) return;

    const chapterData = chapters[String(currentChapter)];
    if (!chapterData) {
        view.innerHTML = `<div class="welcome"><h2>Capítulo no encontrado</h2></div>`;
        return;
    }

    // Save last passage to localStorage
    localStorage.setItem('lastBook', currentBook);
    localStorage.setItem('lastChapter', currentChapter);

    const maxCh = Object.keys(chapters).length;
    
    let html = `<div class="chapter-card"><div class="chapter-title">${currentBook} ${currentChapter}</div><div id="chapterStats" class="chapter-stats"></div>`;
    for (const [vNum, vText] of Object.entries(chapterData)) {
        var verseRef = currentBook + ' ' + currentChapter + ':' + vNum;
        const processedText = markStrongWords(vText, verseRef);
        html += `<div class="verse"><span class="v-num">${vNum}</span>${processedText}</div>`;
    }
    html += '</div>';
    view.innerHTML = html;
    applyHighlights();
    var totalWus = view.querySelectorAll('.wu').length;
    var withStrong = view.querySelectorAll('.wu-has-strong').length;
    var pct = totalWus > 0 ? (withStrong / totalWus * 100).toFixed(1) : '0.0';
    document.getElementById('chapterStats').textContent = 'Total palabras: ' + totalWus + ' | Con Strong: ' + withStrong + ' | Sin Strong: ' + (totalWus - withStrong) + ' | Reconocido: ' + pct + '%';

    document.getElementById('prevCh').disabled = currentChapter <= 1;
    document.getElementById('nextCh').disabled = currentChapter >= maxCh;

    view.querySelectorAll('.v-num').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            const v = this.textContent;
            document.getElementById('search').value = `${currentBook} ${currentChapter}:${v}`;
            this.parentElement.style.background = 'rgba(42, 92, 122, 0.1)';
            setTimeout(() => { 
                if (!highlights[`${currentBook} ${currentChapter}:${v}`]) {
                    this.parentElement.style.background = ''; 
                } else {
                    this.parentElement.style.backgroundColor = highlights[`${currentBook} ${currentChapter}:${v}`];
                }
            }, 1500);
        });
    });

    view.querySelectorAll('.verse').forEach(el => {
        el.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const vNum = this.querySelector('.v-num')?.textContent;
            if (vNum) {
                showHighlightMenu(e, `${currentBook} ${currentChapter}:${vNum}`);
            }
        });
    });
}

function parseReference(ref) {
    const parts = ref.trim().split(/\s+/);
    if (parts.length < 2) return;

    const chPart = parts.pop(); // e.g., "3:16" or "1"
    const bookName = parts.join(' ');

    let ch = parseInt(chPart);
    let v = null;

    if (chPart.includes(':')) {
        const [c, ...vp] = chPart.split(':');
        ch = parseInt(c);
        v = vp.join(':');
    }

    // Find the book
    const key = bookName.toLowerCase().trim();
    const alias = BOOK_ALIASES[key];
    let match = alias ? alias : BOOK_NAMES.find(b => b.toLowerCase() === key);
    if (match) {
        currentBook = match;
        currentChapter = ch;
        showChapter();
        document.getElementById('search').value = ref;
        if (v) {
            setTimeout(() => {
                const target = document.querySelector(`.v-num`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 200);
        }
        return true;
    }
    return false;
}

function searchBible(query) {
    console.log('Búsqueda:', query);
    const q = stripAccents(query.toLowerCase().trim());
    if (!q) {
        showWelcome();
        return;
    }
    
    // Check for reference pattern: "Book C:V", "Book C.V", "Book C V", or "Book C"
    let refMatch = q.match(/^([a-záéíóúüñ\s]+?)\s*(\d+)(?:[:.](\d+))?$/i);
    if (!refMatch) {
        refMatch = q.match(/^([a-záéíóúüñ\s]+?)\s+(\d+)\s+(\d+)$/i);
    }
    if (refMatch) {
        const bk = refMatch[1].trim();
        const ch = parseInt(refMatch[2]);
        const bkey = stripAccents(bk.toLowerCase());
        const balias = BOOK_ALIASES[bkey];
        let book = balias ? balias : BOOK_NAMES.find(b => stripAccents(b.toLowerCase()) === bkey);
        if (!book) {
            book = BOOK_NAMES.find(b => stripAccents(b.toLowerCase()).startsWith(bkey) || bkey.startsWith(stripAccents(b.toLowerCase().split(' ').pop())));
        }
        if (book && BIBLE_DATA[book] && BIBLE_DATA[book][String(ch)]) {
            currentBook = book;
            currentChapter = ch;
            showChapter();
            return;
        }
    }
    
    // Full-text search across Bible
    const results = [];
    const scope = searchFilter === 'AT' ? AT_BOOKS : searchFilter === 'NT' ? NT_BOOKS : ALL_BOOKS;
    for (const book of scope) {
        for (const [chNum, verses] of Object.entries(BIBLE_DATA[book])) {
            for (const [vNum, vText] of Object.entries(verses)) {
                const testText = stripAccents(vText.toLowerCase());
                if (testText.includes(q)) {
                    results.push({ book, chapter: parseInt(chNum), verse: parseInt(vNum), text: vText });
                }
            }
        }
    }
    console.log('Resultados encontrados:', results.length);
    
    const view = document.getElementById('bible-view');
    if (results.length === 0 && STRONG_DATA) {
        // Try searching in Strong data (Hebrew/Greek, transliteration, synonyms)
        var strongMatches = [];
        var qLower = q.toLowerCase();
        STRONG_DATA.forEach(function(e) {
            var match = false;
            if (e.w && stripAccents(e.w.toLowerCase()).includes(qLower)) match = true;
            if (e.t && e.t.toLowerCase().includes(qLower)) match = true;
            if (e.s) e.s.forEach(function(syn) {
                if (stripAccents(syn.toLowerCase()).includes(qLower)) match = true;
            });
            if (String(e.n).includes(q) || String(e.l).toLowerCase() + e.n === q) match = true;
            if (match) strongMatches.push(e);
        });
        
        if (strongMatches.length > 0) {
            var strongHtml = '<div class="chapter-card"><div class="chapter-title">Búsqueda en Léxico: ' + query + '</div>';
            strongMatches.slice(0, 50).forEach(function(e) {
                var num = e.l + e.n;
                var syns = e.s ? e.s.join(', ') : '';
                strongHtml += '<div class="verse" style="cursor:pointer;padding:6px 0;" data-s="' + num + '">' +
                    '<span class="v-num" style="font-size:11px;">' + num + '</span> ' +
                    (e.w ? '<span style="font-size:18px;font-weight:700;direction:rtl;unicode-bidi:embed;margin-right:8px;">' + escHtml(e.w) + '</span>' : '') +
                    (e.t ? '<span style="font-style:italic;color:var(--text-muted);margin-right:8px;">' + escHtml(e.t) + '</span>' : '') +
                    '<span style="font-size:12px;color:var(--text);">' + escHtml((syns ? syns + ' — ' : '') + (e.d || '').slice(0, 100)) + '</span>' +
                    '</div>';
            });
            if (strongMatches.length > 50) {
                strongHtml += '<div class="verse" style="color:var(--text-muted);text-align:center;padding:8px;">… y ' + (strongMatches.length - 50) + ' resultados más</div>';
            }
            strongHtml += '</div>';
            view.innerHTML = strongHtml;
            
            view.querySelectorAll('.verse[data-s]').forEach(function(el) {
                el.addEventListener('click', function() {
                    var num = this.dataset.s;
                    showWordInfo(num, num, 'Strong: ' + num);
                });
            });
            
            searchResults = [];
            return;
        }
    }
    
    if (results.length === 0) {
        view.innerHTML = `<div class="welcome"><h2>Sin resultados</h2><p class="sub">No se encontraron versículos para "${query}"</p></div>`;
        searchResults = [];
        return;
    }
    
    searchResults = results;
    let html = `<div class="chapter-card"><div class="chapter-title">Resultados: ${results.length} versículos</div>`;
    const maxShow = Math.min(100, results.length);
    for (let i = 0; i < maxShow; i++) {
        const r = results[i];
        const ref = `${r.book} ${r.chapter}:${r.verse}`;
        
        // Highlight search term
        const regex = new RegExp(`(${q})`, 'gi');
        let text = r.text.length > 120 ? r.text.slice(0, 120) + '…' : r.text;
        const highlightedText = text.replace(regex, '<mark style="background: #ffd700; color: #000;">$1</mark>');
        const finalText = markStrongWords(highlightedText, ref);
        
        html += `<div class="verse" style="cursor:pointer;padding:4px 0;" data-ref="${ref}"><span class="v-num">${ref}</span> ${finalText}</div>`;
    }
    if (results.length > 100) {
        html += `<div class="verse" style="color:var(--text-muted);text-align:center;padding:8px;">… y ${results.length - 100} resultados más</div>`;
    }
    html += '</div>';
    view.innerHTML = html;
    applyHighlights();
    
    view.querySelectorAll('.verse[data-ref]').forEach(el => {
        el.addEventListener('click', function() {
            const ref = this.dataset.ref;
            document.getElementById('search').value = ref;
            console.log('Versículo seleccionado:', ref);
            const lastSpace = ref.lastIndexOf(' ');
            const book = ref.slice(0, lastSpace);
            const rest = ref.slice(lastSpace + 1);
            const [ch, v] = rest.split(':').map(Number);
            
            currentBook = book;
            currentChapter = ch;
            showChapter();
            
            setTimeout(() => {
                const allVNums = document.querySelectorAll('.v-num');
                allVNums.forEach(el => {
                    if (el.textContent === String(v)) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 200);
        });
        
        el.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            const ref = this.dataset.ref;
            if (ref) {
                showHighlightMenu(e, ref);
            }
        });
    });
}

// Word info panel (double-click)
function showWordInfo(word, strongsStr, ref) {
    var overlay = document.getElementById('wordInfoOverlay');
    document.getElementById('wordInfoWord').textContent = word;
    document.getElementById('wordInfoRef').textContent = ref || '';
    
    var body = document.getElementById('wordInfoBody');
    var tabs = document.getElementById('wordInfoTabs');
    body.innerHTML = '';
    tabs.innerHTML = '';
    
    if (!strongsStr) {
        body.innerHTML = '<div class="word-info-empty">No hay información Strong disponible para esta palabra.</div>';
        overlay.classList.add('open');
        return;
    }
    
    var allNums = strongsStr.split(',').filter(Boolean);
    
    // If multiple Strong numbers, create tabs
    if (allNums.length > 1) {
        allNums.forEach(function(num, idx) {
            var tab = document.createElement('button');
            tab.className = 'tab-btn' + (idx === 0 ? ' active' : '');
            tab.textContent = num;
            tab.dataset.idx = idx;
            tab.addEventListener('click', function() {
                tabs.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                body.querySelectorAll('.word-info-entry').forEach(function(e, i) {
                    e.style.display = i === parseInt(this.dataset.idx) ? 'block' : 'none';
                }.bind(this));
            });
            tabs.appendChild(tab);
        });
    }
    
    allNums.forEach(function(num, idx) {
        var entry = document.createElement('div');
        entry.className = 'word-info-entry';
        if (allNums.length > 1) entry.style.display = idx === 0 ? 'block' : 'none';
        
        var detail = STRONG_MAP[num];
        if (window.location.search.indexOf('debug=1') >= 0) {
            console.log('[word-info] Strong solicitado: ' + num +
                ' | Diccionario usado: ' + (num.charAt(0) === 'H' ? 'Hebrew' : 'Greek') +
                ' | Resultado: ' + (detail ? (detail.w || detail.t || '(encontrado)') : 'NO ENCONTRADO'));
        }

        var html = '<div class="strong-num">' + num + '</div>';
        
        if (detail) {
            html += '<div class="lemma-row">';
            if (detail.w) {
                html += '<span class="orig-lemma">' + escHtml(detail.w) + '</span>';
            }
            if (detail.t) {
                html += '<span class="translit-lemma">' + escHtml(detail.t) + '</span>';
            }
            html += '</div>';
            
            if (detail.s && detail.s.length) {
                html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">' +
                    'Sinónimos: ' + detail.s.join(', ') + '</div>';
            }
            
            if (detail.d) {
                html += '<div class="definition">' + escHtml(detail.d) + '</div>';
            }
            
            // Kittel cross-reference for Greek lemmas
            if (num.startsWith('G') && detail.w) {
                var kittelRefs = findKittelForLemma(detail.w);
                if (kittelRefs && kittelRefs.length > 0) {
                    html += '<div class="kittel-ref">';
                    html += '<strong style="color:#4a90e2;">📖 Kittel / TDNT</strong><br>';
                    kittelRefs.forEach(function(kr) {
                        var pageStr = kr.p ? ' — pág. ' + kr.p : '';
                        if (kr.t && kr.t.length > 100) {
                            var preview = kr.t.slice(0, 150).replace(/\n/g, ' ') + '…';
                            html += '<div style="margin-top:4px;">' + escHtml(preview) + '</div>';
                        }
                        html += '<a href="#" class="kittel-link" data-page="' + (kr.p || '') + '" data-text="' + escHtml(kr.t || '') + '">Ver artículo en Kittel' + pageStr + '</a>';
                    });
                    html += '</div>';
                }
            }
        } else {
            html += '<div class="definition">No se encontró información detallada para este número.</div>';
        }
        
        entry.innerHTML = html;
        body.appendChild(entry);
    });
    
    overlay.classList.add('open');
}

// Navegación por Menú Hamburguesa
function initNav() {
    const navOverlay = document.getElementById('navOverlay');
    const navPanel = document.getElementById('navPanel');
    const navContent = document.getElementById('navContent');
    const navTitle = document.getElementById('navTitle');
    const menuBtn = document.getElementById('menuBtn');

    function openNav(view) {
        navOverlay.classList.add('open');
        navPanel.classList.add('open');
        renderNav(view);
    }

    function closeNav() {
        navOverlay.classList.remove('open');
        navPanel.classList.remove('open');
    }

    function renderNav(view, book = null, chapter = null) {
        navContent.innerHTML = '';
        
        if (view === 'books') {
            navTitle.textContent = 'Libros';
            BOOK_NAMES.forEach(name => {
                const item = document.createElement('div');
                item.className = `nav-item ${name === currentBook ? 'active' : ''}`;
                item.innerHTML = `<span>${name}</span> <span>❯</span>`;
                item.onclick = () => { document.getElementById('search').value = name; renderNav('chapters', name); };
                navContent.appendChild(item);
            });
        } else if (view === 'chapters') {
            navTitle.textContent = book;
            const back = document.createElement('div');
            back.className = 'nav-back';
            back.innerHTML = '<span>◀ Volver a Libros</span>';
            back.onclick = () => renderNav('books');
            navContent.appendChild(back);

            const grid = document.createElement('div');
            grid.className = 'nav-grid';
            const chapters = Object.keys(BIBLE_DATA[book]);
            chapters.forEach(ch => {
                const item = document.createElement('div');
                item.className = `nav-grid-item ${ch == currentChapter ? 'active' : ''}`;
                item.textContent = ch;
                item.onclick = () => { document.getElementById('search').value = book + ' ' + ch; renderNav('verses', book, ch); };
                grid.appendChild(item);
            });
            navContent.appendChild(grid);
        } else if (view === 'verses') {
            navTitle.textContent = `${book} ${chapter}`;
            const back = document.createElement('div');
            back.className = 'nav-back';
            back.innerHTML = `<span>◀ Volver a Capítulos de ${book}</span>`;
            back.onclick = () => renderNav('chapters', book);
            navContent.appendChild(back);

            const verses = BIBLE_DATA[book][chapter];
            Object.keys(verses).forEach(v => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerHTML = `<span>Versículo ${v}</span>`;
                item.onclick = () => {
                    document.getElementById('search').value = book + ' ' + chapter + ':' + v;
                    currentBook = book;
                    currentChapter = parseInt(chapter);
                    showChapter();
                    closeNav();
                    setTimeout(() => {
                        const allVNums = document.querySelectorAll('.v-num');
                        allVNums.forEach(el => {
                            if(el.textContent === v) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        });
                    }, 200);
                };
                navContent.appendChild(item);
            });
        }
    }

    menuBtn.addEventListener('click', () => openNav('books'));
    document.getElementById('navClose').addEventListener('click', closeNav);
    navOverlay.addEventListener('click', closeNav);
}

// Initialize navigation
initNav();

// Messages from parent
window.addEventListener('click', function(e) {
    if (!e.target.closest('.highlight-menu')) {
        document.getElementById('highlightMenu').style.display = 'none';
    }
});

window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'toggleDark') {
        isDark = e.data.dark;
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem('bibliaDark', isDark);
    }
    if (e.data.type === 'search') {
        document.getElementById('search').value = e.data.query || '';
        searchBible(e.data.query || '');
    }
    if (e.data.type === 'fontChange') {
        document.querySelectorAll('.verse').forEach(function(el) { el.style.fontSize = e.data.size + 'px'; });
    }
    if (e.data.type === 'strongToggle') {
        setStrongEnabled(e.data.enabled);
    }
});

// Font Size Control
let currentFontSize = parseInt(localStorage.getItem('bibliaFontSize')) || 16;
const fontLabel = document.getElementById('fontSizeLabel');

function applyFontSize(size) {
    currentFontSize = size;
    // Update CSS variable
    document.documentElement.style.setProperty('--verse-font-size', size + 'px');
    // Fallback: update all verses directly to ensure it works
    document.querySelectorAll('.verse').forEach(el => {
        el.style.fontSize = size + 'px';
    });
    if (fontLabel) fontLabel.textContent = size;
    localStorage.setItem('bibliaFontSize', size);
}

document.getElementById('fontDecr').addEventListener('click', () => {
    if (currentFontSize > 8) applyFontSize(currentFontSize - 1);
});

document.getElementById('fontIncr').addEventListener('click', () => {
    if (currentFontSize < 40) applyFontSize(currentFontSize + 1);
});

// Initial application of font size
applyFontSize(currentFontSize);

// Init strong toggle state from localStorage
var strongBtn = document.getElementById('strongToggle');
strongBtn.textContent = 'Strong: ' + (strongEnabled ? 'On' : 'Off');
strongBtn.classList.toggle('active', strongEnabled);

// Init
document.getElementById('search').value = '';
const lastBook = localStorage.getItem('lastBook');
const lastChapter = localStorage.getItem('lastChapter');

if (lastBook && lastChapter) {
    currentBook = lastBook;
    currentChapter = parseInt(lastChapter);
    showChapter();
} else {
    currentBook = 'Génesis';
    currentChapter = 1;
    showChapter();
}
</script>
</body>
</html>
