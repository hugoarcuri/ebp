<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Estudio Bíblico</title>
<link rel="icon" type="image/png" href="icon.png">
<style>
:root {
    --bg: #F5F2EB; --text: #1C1814;
    --header-bg: #1C0E0A;
    --border: #E8E0C8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.global-search { flex-shrink: 0; display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 10px; padding: 6px 20px; background: var(--bg); }
.global-search .bar { width: 800px; max-width: 100%; background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); padding: 10px 16px; display: flex; align-items: center; gap: 8px; transition: box-shadow 0.2s; }
.global-search .bar:focus-within { box-shadow: 0 4px 20px rgba(0,0,0,0.14); }
.global-search .bar .icon { flex-shrink: 0; color: #B0A898; display: block; }
.global-search .bar input { flex: 1; border: none; padding: 8px 0; font-size: 15px; font-family: "Inter", system-ui, sans-serif; outline: none; background: transparent; color: #1C1814; }
.global-search .bar input::placeholder { color: #B8AFA0; }
#darkToggle, #layoutToggle { position: relative; z-index: 1; background: none; border: 1px solid rgba(0,0,0,0.15); color: var(--text); font-size: 15px; padding: 5px 11px; border-radius: 6px; cursor: pointer; line-height: 1; flex-shrink: 0; transition: background 0.15s; }
#darkToggle:hover, #layoutToggle:hover { background: rgba(0,0,0,0.05); }
.dark { --bg: #1C1410; --text: #E8E0C8; --border: #3A3228; }
main { flex: 1; display: flex; overflow: hidden; }
.col { flex: 3; min-width: 0; display: flex; flex-direction: column; }
#col-biblia { flex: 4; }
.col-body { flex: 1; min-height: 0; }
.col-body iframe { width: 100%; height: 100%; border: none; display: block; }
#visitCounter { position: fixed; bottom: 8px; right: 10px; font-size: 12px; color: #8A8072; background: #fff; padding: 5px 12px; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); z-index: 10; opacity: 0.75; user-select: none; }
.global-font-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 4px; border-bottom: 1px solid var(--border); background: var(--bg); }
.global-font-bar .font-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 700; padding: 3px 12px; border-radius: 5px; cursor: pointer; line-height: 1.4; transition: background 0.12s; }
.global-font-bar .font-btn:hover { background: rgba(0,0,0,0.05); }
.global-font-bar #fontSizeLabel { font-size: 11px; color: var(--text-muted); min-width: 20px; text-align: center; font-weight: 700; user-select: none; }

/* mobile-tabs: hidden by default (columns mode), shown on mobile */
.mobile-tabs { display: none; }
@media (max-width: 700px) {
    .mobile-tabs { display: flex; background: var(--header-bg); }
}

/* tab-mode: force tab layout on all screen sizes */
body.tab-mode .mobile-tabs { display: flex; background: var(--header-bg); }
body.tab-mode .mobile-tabs button { flex: 1; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 600; padding: 10px; cursor: pointer; transition: background 0.15s, color 0.15s; }
body.tab-mode .mobile-tabs button.active { color: #fff; background: rgba(255,255,255,0.1); font-size: 15px; }
body.tab-mode .mobile-tabs button:hover { background: rgba(255,255,255,0.06); }

body.tab-mode main { flex-direction: column; }
body.tab-mode .col { flex: none !important; height: calc(100vh - 98px); border-right: none; border-bottom: none; display: none; }
body.tab-mode .col.active { display: flex; }

@media (max-width: 700px) {
    .mobile-tabs button { flex: 1; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 600; padding: 10px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .mobile-tabs button.active { color: #fff; background: rgba(255,255,255,0.1); font-size: 15px; }
    main { flex-direction: column; }
    .col { flex: none !important; height: calc(100vh - 98px); border-right: none; border-bottom: none; display: none; }
    .col.active { display: flex; }
}
</style>
</head>
<body>

<div class="global-search">
    <div class="bar">
        <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="7"/><path d="M21 21l-5.2-5.2"/></svg>
        <input type="text" id="globalSearch" placeholder="Buscar simultáneamente en Kittel, Biblia y Strong…" autocomplete="off">
    </div>
    <button id="layoutToggle" title="Alternar entre columnas y pestañas">▦ Cols</button>
    <button id="darkToggle" title="Alternar modo oscuro">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
</div>

<div class="mobile-tabs">
    <button class="active" data-tab="kittel">Kittel</button>
    <button data-tab="biblia">Biblia</button>
    <button data-tab="strong">Strong</button>
</div>

<main>
    <div class="col active" id="col-kittel">
        <div class="col-body">
            <iframe src="kittelProject/index.html" id="frameKittel" name="frameKittel"></iframe>
        </div>
    </div>
    <div class="col" id="col-biblia">
        <div class="col-body">
            <iframe src="kittelProject/biblia.html" id="frameBiblia" name="frameBiblia"></iframe>
        </div>
    </div>
    <div class="col" id="col-strong">
        <div class="col-body">
            <iframe src="kittelProject/strong.html" id="frameStrong" name="frameStrong"></iframe>
        </div>
    </div>
</main>

<script>
var globalSearch = document.getElementById('globalSearch');
var frameKittel = document.getElementById('frameKittel');
var frameBiblia = document.getElementById('frameBiblia');
var frameStrong = document.getElementById('frameStrong');
var darkToggle = document.getElementById('darkToggle');
var layoutToggle = document.getElementById('layoutToggle');

// Clear search history on reload
globalSearch.value = '';

var isDark = localStorage.getItem('globalDark') !== 'false';
if (isDark) document.documentElement.classList.add('dark');
updateDarkIcon();

var isTabMode = localStorage.getItem('layoutMode') === 'tab';
if (isTabMode) document.body.classList.add('tab-mode');
updateLayoutIcon();

function updateDarkIcon() {
    darkToggle.innerHTML = isDark
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

darkToggle.addEventListener('click', function() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    localStorage.setItem('globalDark', isDark);
    updateDarkIcon();
    frameKittel.contentWindow.postMessage({ type: 'toggleDark', dark: isDark }, '*');
    frameBiblia.contentWindow.postMessage({ type: 'toggleDark', dark: isDark }, '*');
    frameStrong.contentWindow.postMessage({ type: 'toggleDark', dark: isDark }, '*');
});

layoutToggle.addEventListener('click', function() {
    isTabMode = !isTabMode;
    document.body.classList.toggle('tab-mode', isTabMode);
    localStorage.setItem('layoutMode', isTabMode ? 'tab' : 'cols');
    updateLayoutIcon();
    // Ensure active tab/col is visible
    if (isTabMode) {
        var activeBtn = document.querySelector('.mobile-tabs button.active');
        if (activeBtn) {
            document.querySelectorAll('.col').forEach(function(c) { c.classList.remove('active'); });
            document.getElementById('col-' + activeBtn.dataset.tab).classList.add('active');
        }
    }
});

function updateLayoutIcon() {
    layoutToggle.innerHTML = isTabMode ? '☰ Pestañas' : '▦ Columnas';
    layoutToggle.title = isTabMode ? 'Cambiar a vista de columnas' : 'Cambiar a vista de pestañas';
}

document.querySelectorAll('.mobile-tabs button').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.mobile-tabs button').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        document.querySelectorAll('.col').forEach(function(c) { c.classList.remove('active'); });
        document.getElementById('col-' + btn.dataset.tab).classList.add('active');
    });
});

globalSearch.addEventListener('input', function() {
    sendSearch(globalSearch.value);
});

function sendSearch(q) {
    frameKittel.contentWindow.postMessage({ type: 'search', query: q }, '*');
    frameBiblia.contentWindow.postMessage({ type: 'search', query: q }, '*');
    frameStrong.contentWindow.postMessage({ type: 'search', query: q }, '*');
}

(function() {
    const ck = 'globalVisits';
    let v = parseInt(localStorage.getItem(ck)) || 0;
    if (!sessionStorage.getItem('globalVisited')) {
        v++;
        localStorage.setItem(ck, v);
        sessionStorage.setItem('globalVisited', '1');
    }
    var el = document.createElement('div');
    el.id = 'visitCounter';
    el.textContent = '👁 ' + v + (v === 1 ? ' visita' : ' visitas');
    document.body.appendChild(el);
})();
</script>
</body>
</html>
